server:
  port: 8080

spring:
  # WebFlux 配置（可选）
  webflux:
    client:
      timeout: 3m
  # Spring AI 通用配置
  ai:
    # 硅基流动自定义配置
    siliconflow:
      api-key: sk-xxx
      base-url: https://api.siliconflow.cn/v1
      chat:
        model: Qwen/Qwen3-8B
        temperature: 0.7
        max-tokens: 2048
    # OpenAI 配置
    openai:
      api-key: sk-xujecnlpwhzeblchesixzesvyriochsngxykdvkrpgcasdey
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: Qwen/Qwen3-8B
          temperature: 0.7
    # Ollama 本地模型配置
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: qwen2.5:7b # 本地部署的Ollama模型名
          temperature: 0.7

